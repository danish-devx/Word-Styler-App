<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Word Styler</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css">

</head>

<body>

    <div class="main-container">

        <h1 class="main-heading">Word Styler</h1>

        <div id="textInput" contenteditable="true" class="textInput"></div>

        <div class="buttons-container">

            <button id="boldBtn"><i class="fa-solid fa-bold"></i></button>
            <button id="italicBtn"><i class="fa-solid fa-italic"></i></button>
            <button id="underlineBtn"><i class="fa-solid fa-underline"></i></button>

            <button id="left"><i class="fa-solid fa-align-left"></i></button>
            <button id="center"><i class="fa-solid fa-align-center"></i></button>
            <button id="right"><i class="fa-solid fa-align-right"></i></button>

            <input type="color" id="textColor">
            <input type="color" id="bgColor">

            <select id="fontSize">
                <option value="">Font Size</option>
                <option value="1">Small</option>
                <option value="3">Normal</option>
                <option value="5">Large</option>
                <option value="7">Extra Large</option>
            </select>

            <button id="copy"><i class="fa-solid fa-copy"></i></button>
            <button id="reset"><i class="fa-solid fa-arrows-rotate"></i></button>

        </div>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="app.js"></script>

</body>

</html>
